# cargo-audit configuration
# https://docs.rs/cargo-audit/latest/cargo_audit/config/

[advisories]

ignore = [
  # Ignore the lru unsound advisory - it comes from near-vm-runner which is
  # locked to lru ^0.12.3 and cannot be updated to the fixed 0.16.3 version.
  # The advisory relates to IterMut's Stacked Borrows violation, which does
  # not affect our usage as we don't use IterMut directly.
  # Tracked: https://github.com/near/nearcore/issues/XXXXX (upstream)
  "RUSTSEC-2026-0002",

  # Ignore time unsound advisory - it comes from cargo-near-build
  # and affects RFC 2822 date parsing only, which does not affect our usage
  # in build scripts. Upgrading to the patched version (>=0.3.47) requires
  #  Rust >=1.88, which is incompatible with the NEAR VM toolchain (1.86.0)
  "RUSTSEC-2026-0009",

  # Ignore git2 unsound advisory - it comes from cargo-near-build (0.9.0)
  # which depends on git2 0.19, and related to the undefined behavior
  # after dereferencing an empty buffer, which does not affect
  # our usage in build scripts.
  "RUSTSEC-2026-0008",

  # tokio-tar parses PAX extended headers incorrectly - no fix available.
  # Used only via testcontainers -> near-kit -> defuse-wallet-relayer (dev/test dep).
  # Not reachable in production contract code.
  "RUSTSEC-2025-0111",

  # Rand is unsound when a custom logger that itself calls rand::rng() is
  # installed - no fix available. We do not use any such logger, so this
  # unsoundness cannot be triggered. Affects rand 0.8.x/0.9.x/0.10.x and
  # transitive users (slipped10).
  "RUSTSEC-2026-0097",
]
