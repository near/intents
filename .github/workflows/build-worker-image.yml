name: Build & push worker image

on:
  # Manual trigger — pick the branch to build from in the Actions tab.
  # NOTE: workflow_dispatch only shows up once this file is on the default branch.
  workflow_dispatch:
  # TEMPORARY: lets us test the workflow from the feature branch before it's on
  # main (where workflow_dispatch isn't available yet). REMOVE once it builds &
  # pushes successfully.
  push:
    branches: ["feat/outlayer-ops"]
  # TODO: enable automatic builds once we're ready to publish from CI.
  # push:
  #   branches: ["main"]

permissions:
  contents: read
  packages: write

env:
  # ghcr.io/<owner>/<repo>/outlayer-worker. GHCR package visibility is independent
  # of repo visibility: a new package defaults to PRIVATE on first publish even
  # though this repo is public. Confirm/keep it private under repo Settings ->
  # Packages (GITHUB_TOKEN cannot change package visibility, so it isn't set here).
  IMAGE: ghcr.io/${{ github.repository }}/outlayer-worker

jobs:
  build:
    name: Build & push outlayer-worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/outlayer/worker/Dockerfile
          # Phala CVMs run linux/amd64 only.
          platforms: linux/amd64
          push: true
          # Tag with the built revision (commit SHA).
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish image path to summary
        run: |
          {
            echo "### Pushed image"
            echo
            echo "| | |"
            echo "|--|--|"
            echo "| Tag | \`${IMAGE}:${GITHUB_SHA}\` |"
            echo "| Digest | \`${IMAGE}@${DIGEST}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
