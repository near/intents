[package]
name = "defuse-core"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[dependencies]
defuse-bitmap = { workspace = true, features = ["borsh", "serde"] }
defuse-crypto = { workspace = true, features = ["ed25519", "secp256k1", "p256", "near-contract"] }
defuse-deadline.workspace = true
defuse-erc191 = { workspace = true, features = ["borsh", "serde"] }
defuse-fees = { workspace = true, features = ["borsh", "serde"] }
defuse-map-utils.workspace = true
defuse-near-utils.workspace = true
defuse-nep245.workspace = true
defuse-nep413 = { workspace = true, features = ["verify", "serde"] }
defuse-num-utils.workspace = true
defuse-sep53 = { workspace = true }
defuse-serde-utils = { workspace = true, features = ["base58", "base64"] }
defuse-tip191 = { workspace = true, features = ["borsh", "serde"] }
defuse-token-id = { workspace = true, features = ["nep141", "nep171", "nep245", "borsh", "serde"] }
defuse-ton-connect = { workspace = true, features = ["near-contract", "serde"] }
defuse-webauthn = { workspace = true, features = ["ed25519", "p256"] }

defuse-borsh-utils = { workspace = true, features = ["chrono"] }
derive_more = { workspace = true, features = ["from"] }
hex.workspace = true
hex-literal.workspace = true
impl-tools.workspace = true
near-contract-standards.workspace = true
near-sdk = { workspace = true, features = ["deterministic-account-ids"] }
serde_with.workspace = true
thiserror.workspace = true

arbitrary = { workspace = true, optional = true }
near-api-types = { workspace = true, optional = true }

[features]
abi = [
  "defuse-bitmap/abi",
  "defuse-crypto/abi",
  "defuse-deadline/abi",
  "defuse-erc191/abi",
  "defuse-fees/abi",
  "defuse-nep413/abi",
  "defuse-sep53/abi",
  "defuse-serde-utils/abi",
  "defuse-tip191/abi",
  "defuse-token-id/abi",
  "defuse-ton-connect/abi",
  "defuse-webauthn/abi",
  "near-sdk/abi",
]
arbitrary = [
  "defuse-bitmap/arbitrary",
  "defuse-crypto/arbitrary",
  "defuse-token-id/arbitrary",
  "defuse-ton-connect/arbitrary",
  "dep:arbitrary",
]
imt = ["defuse-token-id/imt"]
near-api-types = ["dep:near-api-types"]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
chrono = { workspace = true, features = ["now"] }

[dev-dependencies]
defuse-test-utils.workspace = true

arbitrary.workspace = true
hex-literal.workspace = true
itertools.workspace = true
near-sdk = { workspace = true, features = ["unit-testing"] }
rstest.workspace = true

[lints]
workspace = true
