[package]
name = "defuse-outlayer-app"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
repository.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[lints]
workspace = true

[features]
abi = ["defuse-outlayer-app-core/abi", "defuse-serde-utils/abi", "near-sdk/abi"]
contract = []

[dependencies]
defuse-outlayer-app-core = { workspace = true, features = ["borsh", "serde"] }
defuse-serde-utils = { workspace = true, features = ["hex"] }
near-sdk.workspace = true

[dev-dependencies]
clap = { workspace = true, features = ["wrap_help"] }
hex.workspace = true
near-sdk = { workspace = true, features = ["non-contract-usage"] }
url.workspace = true

[package.metadata.near.reproducible_build]
image = "sourcescan/cargo-near:0.21.1-rust-1.93.0"
image_digest = "sha256:79b789c81ba19ec30794a6b1046b02dcaf5c055994b22cc7c9af67ab5096b095"
passed_env = []
container_build_command = [
  "cargo",
  "near",
  "build",
  "non-reproducible-wasm",
  "--locked",
  "--features=contract",
  "--abi-features=abi,contract",
  "--no-embed-abi",
]
