[package]
name = "defuse-wallet"
edition.workspace = true
version = "0.1.0"
rust-version.workspace = true
repository.workspace = true
readme = "../README.md"

[lib]
crate-type = ["cdylib", "rlib"]

[lints]
workspace = true

[dependencies]
defuse-bitmap = { workspace = true, features = ["borsh"] }
defuse-borsh-utils = { workspace = true, features = ["jiff"] }
defuse-serde-utils = { workspace = true, features = ["jiff"] }
jiff = { workspace = true, features = ["serde"] }

defuse-time = { workspace = true, features = ["jiff"], optional = true }
derive_more = { workspace = true, features = ["from"] }
near-sdk = { workspace = true, features = ["deterministic-account-ids"] }
serde_with = { workspace = true, features = ["base58"] }
thiserror.workspace = true

defuse-crypto = { workspace = true, default-features = false, features = ["parse", "borsh"], optional = true }
defuse-webauthn = { workspace = true, default-features = false, features = ["borsh"], optional = true }

arbitrary = { workspace = true, optional = true }
rand_core = { workspace = true, optional = true }
[features]
abi = [
  "defuse-bitmap/abi",
  "defuse-borsh-utils/abi",
  "defuse-crypto?/abi",
  "defuse-serde-utils/abi",
  "defuse-webauthn?/abi",
  "near-sdk/abi",
  "serde_with/schemars_0_8",
]
arbitrary = ["dep:arbitrary", "near-sdk/arbitrary"]
concurrent = ["dep:rand_core"]
webauthn = ["dep:defuse-webauthn"]

########## Contract variants ##########
# When no features enabled, by default, always reject the signature.
# This can be useful to deploy "1-of-M multisig"/"fan-out" wallet, where
# extensions are pre-defined at the initialization stage (i.e. state_init).
# So only extensions can execute requests via `w_execute_extension()`.
contract = [
  "defuse-crypto?/near-contract",
  "defuse-webauthn?/near-contract",
  "dep:defuse-time",
]

# Webauthn (a.k.a passkey) variants:
webauthn-ed25519 = ["defuse-webauthn/ed25519", "webauthn"]
webauthn-p256 = ["defuse-webauthn/p256", "webauthn"]

# Raw ed25519 signature:
ed25519 = ["defuse-crypto/ed25519", "defuse-crypto/near-contract"]

[package.metadata.near.reproducible_build]
image = "sourcescan/cargo-near:0.21.1-rust-1.96.0"
image_digest = "sha256:ccb22bb4e677ed022d8b9d1aa1b32f0af52dd0471ef1c32e48dedbf68ee6ee17"
passed_env = []
container_build_command = [
  "cargo",
  "near",
  "build",
  "non-reproducible-wasm",
  "--locked",
  "--no-default-features",
  "--features=contract,ed25519",
  "--abi-features=abi,contract,ed25519",
]

