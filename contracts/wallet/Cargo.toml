[dev-dependencies]
arbitrary = { workspace = true, features = ["derive"] }
defuse-test-utils.workspace = true
near-sdk = { workspace = true, features = ["arbitrary", "deterministic-account-ids", "unit-testing"] }
rand.workspace = true
rstest.workspace = true
