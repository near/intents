[package]
name = "defuse-crypto"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[dependencies]
bs58 = { workspace = true }
near-account-id.workspace = true
strum.workspace = true
thiserror.workspace = true

ed25519-dalek = { workspace = true, optional = true }
generic-array = { workspace = true, features = ["compat-0_14"], optional = true }
p256 = { workspace = true, optional = true, features = ["ecdsa"] }

arbitrary = { workspace = true, optional = true }

borsh = { workspace = true, optional = true, features = ["derive"] }
near-sdk = { workspace = true, features = ["unstable"], optional = true }
schemars = { workspace = true, optional = true, features = ["derive"] }
serde = { workspace = true, optional = true, features = ["derive"] }
serde_json = { workspace = true, optional = true }
serde_with = { workspace = true, optional = true }

[features]

ed25519 = ["dep:ed25519-dalek"]
secp256k1 = []
p256 = ["dep:generic-array", "dep:p256"]

borsh = ["dep:borsh", "near-account-id/borsh"]
serde = ["dep:serde", "dep:serde_with", "near-account-id/serde"]
abi = [
  "borsh?/unstable__schema",
  "dep:schemars",
  "dep:serde_json",
  "serde_with?/schemars_0_8",
]
near-contract = ["dep:near-sdk"]

arbitrary = ["dep:arbitrary"]


[lints]
workspace = true

[dev-dependencies]
arbitrary.workspace = true
near-sdk = { workspace = true, features = ["unstable", "unit-testing"] }
rstest.workspace = true
