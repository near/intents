[package]
name = "defuse-kdf"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
defuse-kdf-crypto.workspace = true
impl-tools.workspace = true

borsh = { workspace = true, optional = true }
curve25519-dalek = { workspace = true, optional = true }
digest = { workspace = true, optional = true }
digest-io = { workspace = true, optional = true }
ed25519-dalek = { workspace = true, features = ["digest", "hazmat", "std"], optional = true }
hex = { workspace = true, optional = true }
k256 = { workspace = true, features = ["std", "arithmetic", "ecdsa"], optional = true }

[features]
ed25519 = [
  "defuse-kdf-crypto/ed25519",
  "dep:curve25519-dalek",
  "dep:ed25519-dalek",
]
secp256k1 = ["defuse-kdf-crypto/secp256k1", "dep:k256"]

borsh = ["dep:borsh"]
digest = ["dep:digest", "dep:digest-io"]
hex = ["dep:hex"]
testing = []
zeroize = ["curve25519-dalek?/zeroize", "ed25519-dalek?/zeroize"]

[dev-dependencies]
defuse-kdf = { workspace = true, features = ["borsh", "digest", "ed25519", "secp256k1", "hex"] }

defuse-digest = { workspace = true, features = ["sha3"] }
hex-literal.workspace = true
rstest.workspace = true

[target.'cfg(near)'.dev-dependencies]
near-sdk = { workspace = true, features = ["unit-testing"] }
