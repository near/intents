[package]
name = "defuse-kdf-crypto"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
ed25519-dalek = { workspace = true, features = ["std"], optional = true }
k256 = { workspace = true, features = ["std", "arithmetic", "ecdsa"], optional = true }

[features]
ed25519 = ["dep:ed25519-dalek"]
secp256k1 = ["dep:k256"]

[dev-dependencies]
ed25519-dalek = { workspace = true, features = ["std", "serde"] }
hex-literal.workspace = true
k256 = { workspace = true, features = ["std", "arithmetic", "ecdsa"] }
rstest.workspace = true
