[package]
name = "defuse-promise"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
derive_more = { workspace = true, features = ["from"] }
near-account-id.workspace = true
near-gas.workspace = true
near-token.workspace = true
# TODO: use only for `near-contract` feature once `near-global-contracts` is out
near-sdk = { workspace = true, features = ["deterministic-account-ids"] }

arbitrary = { workspace = true, features = ["derive"], optional = true }
borsh = { workspace = true, features = ["derive"], optional = true }
cfg_eval = { workspace = true, optional = true }
schemars = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
serde_json = { workspace = true, optional = true }
serde_with = { workspace = true, optional = true, features = ["base64"] }

[features]

arbitrary = [
  "dep:arbitrary",
  "near-account-id/arbitrary",
  "near-gas/arbitrary",
  "near-token/arbitrary",
]
abi = [
  "borsh/unstable__schema",
  "dep:schemars",
  "near-account-id/abi",
  "near-gas/abi",
  "near-sdk/abi",
  "near-token/abi",
  "serde_with/schemars_0_8",
]
borsh = [
  "dep:borsh",
  "near-account-id/borsh",
  "near-gas/borsh",
  "near-token/borsh",
]
near-contract = [] # TODO: near-sdk
serde = [
  "dep:cfg_eval",
  "dep:serde",
  "dep:serde_with",
  "near-account-id/serde",
  "near-gas/serde",
  "near-token/serde",
]
json = ["dep:serde_json", "serde"]

[dev-dependencies]
defuse-promise = { path = ".", features = ["arbitrary", "abi", "borsh", "near-contract", "serde", "json"] }
near-sdk = { workspace = true, features = ["unit-testing"] }
rstest.workspace = true
