[package]
name = "defuse-wallet-state"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
near-account-id.workspace = true

defuse-bitmap.workspace = true
defuse-borsh-utils = { workspace = true, features = ["chrono"] }
defuse-deadline.workspace = true

borsh = { workspace = true, optional = true, features = ["derive"] }
thiserror.workspace = true

rand_core = { workspace = true, optional = true }

[features]
borsh = ["defuse-bitmap/borsh", "dep:borsh", "near-account-id/borsh"]
abi = [
  "borsh?/unstable__schema",
  "defuse-bitmap/abi",
  "defuse-borsh-utils/abi",
  "near-account-id/abi",
]
# Selects NEAR runtime clock (env::block_timestamp) for Deadline::now().
# Without this, Deadline::now() uses Utc::now() (suitable for off-chain use).
near-contract = ["defuse-deadline/near-contract"]
concurrent = ["dep:rand_core"]

[dev-dependencies]
borsh.workspace = true
rand.workspace = true
