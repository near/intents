[workspace]
members = [
  "sdk",
  "host",
]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.1.0"
rust-version = "1.94.1"
repository = "https://github.com/near/intents"

[workspace.dependencies]
defuse-outlayer-sdk.path = "sdk"
defuse-outlayer-host.path = "host"

anyhow = "1"
serde_json = "1"
wit-bindgen = "0.55.0"
wasmtime = { version = "43.0.1", features = ["component-model"] }
wasmtime-wasi = "43.0.1"

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
as_conversions = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }

missing_errors_doc = "allow"
missing_panics_doc = "allow"
module_name_repetitions = "allow"
must_use_candidate = "allow"
similar_names = "allow"
too_long_first_doc_paragraph = "allow"
unreadable_literal = "allow"
same_length_and_capacity = "allow"
