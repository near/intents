[package]
name = "defuse-outlayer-crypto"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
impl-tools.workspace = true

curve25519-dalek = { workspace = true, optional = true }
ed25519-dalek = { workspace = true, features = ["std"], optional = true }
k256 = { workspace = true, features = ["std", "arithmetic", "ecdsa"], optional = true }

[features]
ed25519 = ["dep:curve25519-dalek", "dep:ed25519-dalek"]
secp256k1 = ["dep:k256"]

signing = ["ed25519-dalek?/digest", "ed25519-dalek?/hazmat"]

fast = ["ed25519-dalek?/fast", "k256?/precomputed-tables"]
zeroize = ["ed25519-dalek?/zeroize"]

[dev-dependencies]
ed25519-dalek = { workspace = true, features = ["std", "serde"] }
hex-literal.workspace = true
k256 = { workspace = true, features = ["std", "arithmetic", "ecdsa"] }
rstest.workspace = true
