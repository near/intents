[package]
name = "defuse-outlayer-executor"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
defuse-outlayer-vm-runner.workspace = true

defuse-outlayer-proto = { workspace = true, optional = true }

anyhow.workspace = true
bytes.workspace = true
thiserror.workspace = true

cfg_eval = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
serde_with = { workspace = true, features = ["base64"], optional = true }

[features]
default = ["serde"]

proto = ["defuse-outlayer-vm-runner/proto", "dep:defuse-outlayer-proto"]
serde = ["dep:cfg_eval", "dep:serde", "dep:serde_with"]
