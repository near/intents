[package]
name = "defuse-outlayer-executor"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
defuse-outlayer-signer = { workspace = true, features = ["ed25519", "secp256k1"] }
defuse-outlayer-vm-runner.workspace = true

anyhow.workspace = true
bytes.workspace = true
thiserror.workspace = true

defuse-outlayer-utils = { workspace = true, optional = true }

cfg_eval = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
serde_with = { workspace = true, features = ["base64"], optional = true }

[dev-dependencies]
serde_json.workspace = true

[features]
default = ["serde"]

serde = ["dep:cfg_eval", "dep:serde", "dep:serde_with", "dep:defuse-outlayer-utils", "defuse-outlayer-utils/serde"]
