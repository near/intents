[package]
name = "defuse-outlayer-host"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
defuse-outlayer-kdf-app = { workspace = true, features = ["ed25519", "secp256k1"] }
defuse-outlayer-primitives = { workspace = true, features = ["digest"] }
defuse-outlayer-signer = { workspace = true }

anyhow.workspace = true
borsh.workspace = true
digest-io.workspace = true
sha3.workspace = true
tracing.workspace = true
wasmtime = { workspace = true, features = ["runtime", "component-model"] }

[package.metadata.cargo-machete]
ignored = ["tracing"] # required by `wasmtime::component::bindgen!()`
