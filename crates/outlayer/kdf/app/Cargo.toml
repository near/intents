[package]
name = "defuse-outlayer-kdf-app"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
defuse-outlayer-crypto.workspace = true
defuse-outlayer-kdf.workspace = true
defuse-outlayer-primitives.workspace = true

borsh = { workspace = true, features = ["derive"] }
digest-io.workspace = true
sha3.workspace = true

arbitrary = { workspace = true, features = ["derive"], optional = true }

[features]
default = ["ed25519", "secp256k1"] # TODO: remove

arbitrary = ["defuse-outlayer-primitives/arbitrary", "dep:arbitrary"]
ed25519 = ["defuse-outlayer-crypto/ed25519"]
secp256k1 = ["defuse-outlayer-crypto/secp256k1"]
