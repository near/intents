[package]
name = "defuse-outlayer-primitives"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
derive_more = { workspace = true, features = ["from"] }
near-account-id.workspace = true
strum.workspace = true
thiserror.workspace = true

anyhow = { workspace = true, optional = true }
arbitrary = { workspace = true, features = ["derive"], optional = true }
borsh = { workspace = true, features = ["derive"], optional = true }
defuse-outlayer-proto = { workspace = true, optional = true }
schemars = { workspace = true, optional = true, features = ["derive"] }
serde_with = { workspace = true, optional = true }

[features]
abi = [
  "borsh?/unstable__schema",
  "dep:schemars",
  "near-account-id/abi",
  "serde_with?/schemars_0_8",
]
arbitrary = ["dep:arbitrary", "near-account-id/arbitrary"]
borsh = ["dep:borsh", "near-account-id/borsh"]
example = []
proto = ["dep:anyhow", "dep:defuse-outlayer-proto"]
serde = ["dep:serde_with", "near-account-id/serde"]

[dev-dependencies]
hex-literal.workspace = true
rstest.workspace = true
