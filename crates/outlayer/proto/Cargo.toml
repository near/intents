[package]
name = "defuse-outlayer-proto"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true
publish = false

[dependencies]
prost = { workspace = true }
tonic = { workspace = true }
# Not referenced directly in our source: the code generated by
# `tonic-prost-build` and pulled in via `tonic::include_proto!` calls
# `tonic_prost::ProstCodec` to (de)serialize messages at runtime.
tonic-prost = { workspace = true }


[build-dependencies]
tonic-prost-build = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["prost", "tonic-prost"]
