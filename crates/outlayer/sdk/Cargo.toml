[package]
name = "defuse-outlayer-sdk"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[features]
default = ["ed25519", "secp256k1"]

ed25519 = [
  "defuse-outlayer-host/ed25519",
  "defuse-outlayer-sys/ed25519",
  "defuse-outlayer-worker-host/ed25519",
]
secp256k1 = [
  "defuse-outlayer-host/secp256k1",
  "defuse-outlayer-sys/secp256k1",
  "defuse-outlayer-worker-host/secp256k1",
]

[dependencies]
defuse-outlayer-host.workspace = true

[target.'cfg(target_family = "wasm")'.dependencies]
defuse-outlayer-sys = { workspace = true, optional = true }

[target.'cfg(not(target_family = "wasm"))'.dependencies]
defuse-outlayer-worker-host = { workspace = true, optional = true }
