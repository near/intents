[package]
name = "defuse-outlayer-sdk"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
defuse-outlayer-primitives = { workspace = true, features = ["borsh", "serde"] }

base64.workspace = true
borsh = { workspace = true, features = ["derive"] }
bs58.workspace = true
hex.workspace = true
hex-literal.workspace = true
impl-tools.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
serde_with = { workspace = true, features = ["hex", "base64"] }

defuse-kdf = { workspace = true, features = ["ed25519", "secp256k1"], optional = true }
schemars = { workspace = true, optional = true }

[target.'cfg(target_family = "wasm")'.dependencies]
defuse-outlayer-sys.workspace = true

[target.'cfg(not(target_family = "wasm"))'.dependencies]
defuse-outlayer-host.workspace = true
defuse-outlayer-signer = { workspace = true, features = [
  "ed25519",
  "secp256k1",
  "zeroize",
] }
defuse-outlayer-primitives = { workspace = true, features = [
  "borsh",
  "serde",
  "example",
] }

anyhow.workspace = true

[features]
default = ["kdf"]

abi = [
  "borsh/unstable__schema",
  "defuse-outlayer-primitives/abi",
  "dep:schemars",
  "serde_with/schemars_0_8",
]
kdf = ["dep:defuse-kdf"]

[dev-dependencies]
defuse-kdf = { workspace = true, features = ["ed25519", "secp256k1", "testing"] }
hex.workspace = true
rstest.workspace = true
