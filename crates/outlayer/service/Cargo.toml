[package]
name = "defuse-outlayer-service"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
defuse-outlayer-executor.workspace = true
defuse-outlayer-primitives.workspace = true
defuse-serde-utils = { workspace = true, features = ["hex"] }

anyhow.workspace = true
base64.workspace = true
bytes.workspace = true
data-url.workspace = true
derive_more = { workspace = true, features = ["from"] }
futures.workspace = true
moka = { workspace = true, features = ["future"] }
near-kit.workspace = true
reqwest.workspace = true
sha2.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["rt"] }
tower = { workspace = true, features = ["util"] }
tracing.workspace = true
url.workspace = true

cfg_eval = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
serde_with = { workspace = true, optional = true, features = ["hex"] }

[features]
default = ["serde"]

serde = [
  "defuse-outlayer-primitives/serde",
  "dep:cfg_eval",
  "dep:serde",
  "dep:serde_with",
  "url/serde",
]
