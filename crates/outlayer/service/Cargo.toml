[package]
name = "defuse-outlayer-service"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
defuse-outlayer-executor.workspace = true
defuse-outlayer-primitives.workspace = true
defuse-serde-utils = { workspace = true, features = ["hex"] }

anyhow.workspace = true
base64.workspace = true
bytes.workspace = true
data-url.workspace = true
derive_more = { workspace = true, features = ["from"] }
futures.workspace = true
moka = { workspace = true, features = ["future"] }
near-kit.workspace = true
reqwest = { workspace = true, features = ["stream"] }
sha2.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["io-util", "rt"] }
tokio-util = { workspace = true, features = ["io"] }
url.workspace = true

cfg_eval = { workspace = true, optional = true }
defuse-outlayer-proto = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
serde_with = { workspace = true, optional = true, features = ["hex"] }
tonic       = { workspace = true, optional = true }
tonic-prost = { workspace = true, optional = true }
tower       = { workspace = true, optional = true }

[features]
default = ["serde"]

tower = ["dep:tower"]
proto = [
  "dep:defuse-outlayer-proto",
  "defuse-outlayer-executor/proto",
  "defuse-outlayer-primitives/proto",
]
tonic = [
  "tower",
  "tower/load-shed",
  "tower/timeout",
  "tower/util",
  "proto",
  "dep:tonic",
  "dep:tonic-prost",
]
serde = [
  "defuse-outlayer-executor/serde",
  "defuse-outlayer-primitives/serde",
  "dep:cfg_eval",
  "dep:serde",
  "dep:serde_with",
  "url/serde",
]
