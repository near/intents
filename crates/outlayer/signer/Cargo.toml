[package]
name = "defuse-outlayer-signer"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
defuse-outlayer-kdf = { workspace = true, features = ["digest"] }

hkdf = { workspace = true, features = ["kdf"] }
sha3.workspace = true

zeroize = { workspace = true, optional = true }

[features]
ed25519 = ["defuse-outlayer-kdf/ed25519"]
secp256k1 = ["defuse-outlayer-kdf/secp256k1"]
zeroize = ["defuse-outlayer-kdf/zeroize", "dep:zeroize", "sha3/zeroize"]

[dev-dependencies]
hex-literal.workspace = true
rstest.workspace = true
