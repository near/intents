[package]
name = "defuse-outlayer-signer"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
defuse-kdf.workspace = true

hkdf = { workspace = true, features = ["kdf"], optional = true }
sha3 = { workspace = true, optional = true }
zeroize = { workspace = true, optional = true }

[features]
ed25519 = ["defuse-kdf/digest", "defuse-kdf/ed25519", "kdf"]
secp256k1 = ["defuse-kdf/digest", "defuse-kdf/secp256k1", "kdf"]
kdf = ["dep:hkdf", "dep:sha3"]
zeroize = ["defuse-kdf/zeroize", "dep:zeroize", "sha3/zeroize"]

[dev-dependencies]
defuse-kdf = { workspace = true, features = ["testing"] }
defuse-outlayer-signer = { workspace = true, features = ["ed25519", "secp256k1", "kdf"] }
hex-literal.workspace = true
rstest.workspace = true
