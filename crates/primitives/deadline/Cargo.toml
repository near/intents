[package]
name = "defuse-deadline"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[features]
abi = ["defuse-borsh-utils/abi", "dep:schemars"]
near-contract = ["dep:defuse-near-utils"]
serde = ["dep:cfg_eval", "dep:serde"]

[dependencies]
defuse-borsh-utils = { workspace = true, features = ["chrono"] }
defuse-near-utils = { workspace = true, features = ["time"], optional = true }

chrono = { workspace = true, features = ["serde"] }

cfg_eval = { workspace = true, optional = true }
schemars = { workspace = true, features = ["derive"], optional = true }
serde = { workspace = true, features = ["derive"], optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
chrono = { workspace = true, features = ["clock", "now", "serde"] }

[dev-dependencies]
borsh.workspace = true
