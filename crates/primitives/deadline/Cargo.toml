lints.workspace = true

[package]
name = "defuse-deadline"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[dependencies]
chrono.workspace = true

borsh = { workspace = true, optional = true }
defuse-borsh-utils = { workspace = true, features = ["chrono"], optional = true }
schemars = { workspace = true, features = ["derive"], optional = true }
serde = { workspace = true, features = ["derive"], optional = true }

[target.'cfg(near)'.dependencies]
near-sdk.workspace = true

[features]
now = ["chrono/now"]

abi = ["borsh?/unstable__schema", "defuse-borsh-utils?/abi", "dep:schemars"]
borsh = ["dep:borsh", "dep:defuse-borsh-utils"]
serde = ["chrono/serde", "dep:serde"]

[dev-dependencies]
defuse-deadline = { path = ".", features = ["abi", "borsh", "now", "serde"] }

[target.'cfg(near)'.dev-dependencies]
near-sdk = { workspace = true, features = ["unit-testing"] }
