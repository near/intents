[package]
name = "defuse-deadline"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[features]
abi = ["defuse-borsh-utils?/abi", "dep:schemars"]
borsh = ["dep:defuse-borsh-utils"]
serde = ["dep:serde"]

[dependencies]
defuse-borsh-utils = { workspace = true, features = ["chrono"], optional = true }

chrono = { workspace = true, features = ["serde"] }

schemars = { workspace = true, features = ["derive"], optional = true }
serde = { workspace = true, features = ["derive"], optional = true }

[target.'cfg(near)'.dependencies]
defuse-near-utils = { workspace = true, features = ["time"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
chrono = { workspace = true, features = ["clock", "now", "serde"] }

[dev-dependencies]
borsh = { workspace = true, features = ["unstable__schema"] }
defuse-borsh-utils = { workspace = true, features = ["chrono", "abi"] }
near-sdk = { workspace = true, features = ["non-contract-usage"] }
