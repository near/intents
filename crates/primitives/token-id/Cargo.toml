[package]
name = "defuse-token-id"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
near-account-id.workspace = true
derive_more = { workspace = true, features = ["from"] }
strum.workspace = true
thiserror.workspace = true

arbitrary = { workspace = true, optional = true }
borsh = { workspace = true, features = ["derive"], optional = true }
schemars = { workspace = true, optional = true, features = ["derive"] }
serde_with = { workspace = true, optional = true }

[features]
default = ["nep141", "nep171", "nep245"]

nep141 = []
nep171 = []
nep245 = []
imt = []

abi = ["borsh?/unstable__schema", "dep:schemars", "near-account-id/abi"]
arbitrary = ["dep:arbitrary", "near-account-id/arbitrary"]
borsh = ["dep:borsh", "near-account-id/borsh"]
serde = ["dep:serde_with"]

[dev-dependencies]
defuse-test-utils.workspace = true
near-sdk = { workspace = true, features = ["unit-testing"] }

arbitrary.workspace = true
borsh.workspace = true
hex.workspace = true
rstest.workspace = true
serde_json.workspace = true
