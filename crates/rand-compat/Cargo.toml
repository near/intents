rand_core_0_6 = { package = "rand_core", version = "0.6", default-features = false, optional = true }
rand_core_0_9 = { package = "rand_core", version = "0.9", default-features = false, optional = true }

[features]
default = ["rand_core_0_10"]

rand_core_0_6 = ["dep:rand_core_0_6"]
rand_core_0_9 = ["dep:rand_core_0_9"]
rand_core_0_10 = ["dep:rand_core"]
