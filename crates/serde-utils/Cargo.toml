lints.workspace = true

[package]
name = "defuse-serde-utils"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[dependencies]
derive_more = { workspace = true, features = ["from"] }
serde = { workspace = true, features = ["derive"] }
serde_with.workspace = true

jiff = { workspace = true, optional = true }
schemars = { workspace = true, features = ["derive"], optional = true }
tlb-ton = { workspace = true, optional = true }

[features]
abi = ["schemars_0_8"]
base64 = ["serde_with/base64"]
hex = ["serde_with/hex"]
jiff = ["dep:jiff"]
schemars_0_8 = ["dep:schemars", "serde_with/schemars_0_8"]
tlb = ["dep:tlb-ton"]

[dev-dependencies]
defuse-serde-utils = { path = ".", features = ["abi", "base64", "hex", "jiff", "tlb"] }
serde_json.workspace = true
