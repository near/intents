[package]
name = "defuse-erc191"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[dependencies]
defuse-crypto = { workspace = true, default-features = false, features = ["secp256k1"] }

impl-tools.workspace = true

borsh = { workspace = true, features = ["derive"], optional = true }
cfg_eval = { workspace = true, optional = true }
schemars = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
serde_with = { workspace = true, optional = true }
[dev-dependencies]
defuse-test-utils.workspace = true
hex-literal.workspace = true
rstest.workspace = true
sha3.workspace = true

[features]
borsh = ["dep:borsh"]
serde = ["defuse-crypto/serde", "dep:cfg_eval", "dep:serde", "dep:serde_with"]
abi = ["borsh?/unstable__schema", "defuse-crypto/abi", "dep:schemars"]

[lints]
workspace = true
