[package]
name = "defuse-erc191"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[dependencies]
defuse-crypto = { workspace = true, default-features = false, features = ["secp256k1"] }

impl-tools.workspace = true

borsh = { workspace = true, optional = true }
cfg_eval = { workspace = true, optional = true }
near-sdk = { workspace = true, optional = true }
schemars = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
serde_with = { workspace = true, optional = true }
[dev-dependencies]
defuse-test-utils.workspace = true
hex-literal.workspace = true
rstest.workspace = true
sha3.workspace = true

[features]
default = ["serde"]
borsh = ["dep:borsh"]
serde = ["dep:serde", "dep:serde_with", "dep:cfg_eval"]
abi = ["dep:schemars", "borsh/unstable__schema"]
near-contract = ["dep:near-sdk"]

[lints]
workspace = true
