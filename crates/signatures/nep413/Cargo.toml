[package]
name = "defuse-nep413"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[dependencies]
defuse-crypto = { workspace = true, default-features = false, features = ["ed25519"] }
defuse-digest = { workspace = true, features = ["sha2"] }
defuse-nep461.workspace = true

defuse-serde-utils = { workspace = true, features = ["base64"], optional = true }

impl-tools.workspace = true

borsh = { workspace = true, features = ["derive"], optional = true }
cfg_eval = { workspace = true, optional = true }
near-api = { workspace = true, optional = true }
schemars = { workspace = true, optional = true, features = ["derive"] }
serde = { workspace = true, features = ["derive"], optional = true }
serde_with = { workspace = true, optional = true }

[features]
abi = [
  "borsh?/unstable__schema",
  "defuse-crypto/abi",
  "defuse-serde-utils?/abi",
  "dep:schemars",
  "serde_with?/schemars_0_8",
]
borsh = ["defuse-crypto/borsh", "dep:borsh"]
near-contract = ["borsh", "defuse-crypto/near-contract"]
serde = [
  "defuse-crypto/serde",
  "dep:cfg_eval",
  "dep:defuse-serde-utils",
  "dep:serde",
  "dep:serde_with",
]
near-api = ["dep:near-api"]

[dev-dependencies]
serde_json.workspace = true

[lints]
workspace = true
