[package]
name = "defuse-nep413"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[dependencies]
defuse-crypto = { workspace = true, default-features = false, features = ["ed25519", "borsh", "serde"] }
defuse-nep461.workspace = true
defuse-serde-utils = { workspace = true, features = ["base64"] }

impl-tools.workspace = true

borsh = { workspace = true, optional = true }
cfg_eval = { workspace = true, optional = true }
near-api = { workspace = true, optional = true }
schemars = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
serde_with = { workspace = true, optional = true }

[features]
borsh = ["defuse-crypto/borsh", "dep:borsh"]
verify = ["borsh"]
serde = ["defuse-crypto/serde", "dep:cfg_eval", "dep:serde", "dep:serde_with"]
abi = [
  "borsh/unstable__schema",
  "defuse-crypto/abi",
  "defuse-serde-utils/abi",
  "dep:schemars",
]
near-api = ["dep:near-api"]

[lints]
workspace = true
