lints.workspace = true

[package]
name = "defuse-ton-connect"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true

[dependencies]
defuse-crypto = { workspace = true, default-features = false, features = ["ed25519"] }
defuse-digest = { workspace = true, features = ["sha2"] }
defuse-time.workspace = true
impl-tools.workspace = true
tlb-ton.workspace = true

arbitrary = { workspace = true, optional = true }
arbitrary_with = { workspace = true, optional = true }
cfg_eval = { workspace = true, optional = true }
defuse-serde-utils = { workspace = true, features = ["tlb"], optional = true }
schemars = { workspace = true, features = ["chrono"], optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
serde_with = { workspace = true, features = ["base64"], optional = true }

[features]
default = ["binary", "cell", "text"]
abi = [
  "defuse-crypto/abi",
  "defuse-serde-utils?/abi",
  "defuse-time/abi",
  "dep:schemars",
  "serde_with?/schemars_0_8",
  "tlb-ton/schemars_0_8",
]
arbitrary = [
  "defuse-time/arbitrary",
  "dep:arbitrary",
  "dep:arbitrary_with",
  "tlb-ton/arbitrary",
]
binary = []
cell = []
near-contract = ["defuse-crypto/near-contract"]
serde = [
  "defuse-crypto/serde",
  "defuse-time/serde",
  "dep:cfg_eval",
  "dep:defuse-serde-utils",
  "dep:serde",
  "dep:serde_with",
  "tlb-ton/serde",
]
text = []

[dev-dependencies]
defuse-ton-connect = { path = ".", features = ["serde", "arbitrary", "near-contract"] }

arbitrary.workspace = true
defuse-test-utils.workspace = true
hex-literal.workspace = true
near-sdk = { workspace = true, features = ["unit-testing"] }
rstest.workspace = true
serde_json.workspace = true
tlb-ton = { workspace = true, features = ["arbitrary", "base64"] }
