[package]
name = "defuse-webauthn"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
defuse-crypto = { workspace = true, default-features = false }

arbitrary = { workspace = true, optional = true }
cfg_eval = { workspace = true, optional = true }
defuse-serde-utils = { workspace = true, features = ["base64"], optional = true }
digest = { workspace = true }
schemars = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
serde_json = { workspace = true, optional = true }
serde_with = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }
near-sdk = { workspace = true, optional = true }

[features]
default = ["ed25519", "p256"]

abi = ["defuse-crypto/abi", "defuse-serde-utils?/abi", "dep:schemars"]
arbitrary = ["defuse-crypto/arbitrary", "dep:arbitrary"]
borsh = ["defuse-crypto/borsh"]
serde = [
  "defuse-crypto/serde",
  "dep:cfg_eval",
  "dep:defuse-serde-utils",
  "dep:serde",
  "dep:serde_with",
]

verify = ["dep:serde_json", "serde"]
sha2 = ["dep:sha2"]
near-contract = ["dep:near-sdk"]

ed25519 = ["defuse-crypto/ed25519", "defuse-crypto/near-contract"]
p256 = ["defuse-crypto/p256"]

[dev-dependencies]
arbitrary.workspace = true
