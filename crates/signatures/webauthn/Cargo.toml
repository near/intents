[package]
name = "defuse-webauthn"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
defuse-crypto = { workspace = true, default-features = false, features = ["borsh", "serde"] }
defuse-serde-utils = { workspace = true, features = ["base64"] }

serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
serde_with.workspace = true
sha2.workspace = true

schemars = { workspace = true, optional = true }

[features]
default = ["ed25519", "p256"]

abi = ["defuse-crypto/abi", "defuse-serde-utils/abi", "dep:schemars"]
near-contract = ["defuse-crypto/near-contract"]

ed25519 = ["defuse-crypto/ed25519", "near-contract"]
p256 = ["defuse-crypto/p256", "near-contract"]
