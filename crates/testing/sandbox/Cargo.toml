[package]
name = "defuse-sandbox"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[features]
defuse = ["defuse/imt", "dep:defuse-test-utils", "dep:defuse-serde-utils"]
poa = ["dep:defuse-poa-factory"]
deployer = ["dep:defuse-global-deployer", "dep:defuse-serde-utils"]
escrow = ["dep:defuse-escrow-swap"]
wallet = ["dep:defuse-wallet"]

[dependencies]
defuse-crypto = { workspace = true, features = ["near-kit"] }
defuse-nep413 = { workspace = true, features = ["near-kit"] }
defuse-nep245.workspace = true
tokio.workspace = true
rstest.workspace = true

anyhow.workspace = true
futures.workspace = true
libc = "0.2"
impl-tools.workspace = true
near-sdk = { workspace = true, features = [
    "unit-testing",
] }
tracing.workspace = true
near-kit = { workspace = true, features = ["sandbox"] }

near-contract-standards.workspace = true

defuse-poa-factory = { workspace = true, optional = true, features = [
    "contract",
] }
defuse-global-deployer = { workspace = true, optional = true }
defuse-escrow-swap = { workspace = true, optional = true }
defuse-wallet = { workspace = true, optional = true }

defuse = { workspace = true, optional = true, features = ["contract"] }
defuse-serde-utils = { workspace = true, optional = true }
defuse-test-utils = { workspace = true, optional = true }

serde_json.workspace = true