[package]
name = "defuse-sandbox"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[features]
defuse = ["dep:defuse", "dep:defuse-serde-utils", "dep:defuse-test-utils"]
poa = ["dep:defuse-poa-factory"]
deployer = ["dep:defuse-global-deployer", "dep:defuse-serde-utils"]
escrow = ["dep:defuse-escrow-swap"]
imt = ["defuse", "defuse/imt"]
wallet = ["dep:defuse-wallet"]
outlayer = ["dep:defuse-outlayer-app", "dep:defuse-serde-utils"]

[dependencies]
defuse-core = { workspace = true, features = ["near-kit"] }
defuse-nep245.workspace = true
defuse-nep413 = { workspace = true, features = ["near-kit", "serde"] }
rstest.workspace = true
tokio.workspace = true

anyhow.workspace = true
futures.workspace = true
impl-tools.workspace = true
libc = "0.2"
near-kit.workspace = true
near-sandbox.workspace = true
near-sdk = { workspace = true, features = ["unit-testing", "deterministic-account-ids"] }
tracing.workspace = true

near-contract-standards.workspace = true

defuse-escrow-swap = { workspace = true, optional = true, features = ["auth_call"] }
defuse-global-deployer = { workspace = true, optional = true }
defuse-outlayer-app = { workspace = true, optional = true }
defuse-poa-factory = { workspace = true, optional = true, features = ["contract"] }
defuse-wallet = { workspace = true, optional = true }

defuse = { workspace = true, optional = true, features = ["contract"] }
defuse-serde-utils = { workspace = true, optional = true, features = ["base64", "hex"] }
defuse-test-utils = { workspace = true, optional = true }
