lints.workspace = true

[package]
name = "defuse-wallet-core"
edition.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true

[dependencies]
defuse-bitmap.workspace = true
defuse-near-promise.workspace = true
defuse-time.workspace = true
near-account-id.workspace = true
thiserror.workspace = true

arbitrary = { workspace = true, features = ["derive"], optional = true }
arbitrary_with = { workspace = true, optional = true }
borsh = { workspace = true, features = ["derive"], optional = true }
cfg_eval = { workspace = true, optional = true }
defuse-borsh-utils = { workspace = true, optional = true }
defuse-digest = { workspace = true, features = ["sha3"], optional = true }
digest-io = { workspace = true, optional = true }
schemars = { workspace = true, features = ["derive"], optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
serde_with = { workspace = true, optional = true }

[features]
default = ["std"]

std = ["defuse-time/std"]

abi = ["borsh-schema", "schemars-v0_8"]
arbitrary = [
  "defuse-bitmap/arbitrary",
  "defuse-near-promise/arbitrary",
  "defuse-time/arbitrary",
  "dep:arbitrary",
  "dep:arbitrary_with",
  "near-account-id/arbitrary",
]
borsh = [
  "defuse-bitmap/borsh",
  "defuse-near-promise/borsh",
  "defuse-time/borsh",
  "dep:borsh",
  "dep:defuse-borsh-utils",
  "near-account-id/borsh",
]
borsh-schema = [
  "borsh",
  "defuse-bitmap/borsh-schema",
  "defuse-borsh-utils?/schema",
  "defuse-near-promise/borsh-schema",
  "defuse-time/borsh-schema",
  "near-account-id/abi",
]
digest = ["dep:defuse-digest", "dep:digest-io"]
json = ["defuse-near-promise/json"]
schemars-v0_8 = [
  "defuse-near-promise/schemars-v0_8",
  "defuse-time/schemars-v0_8",
  "dep:schemars",
  "near-account-id/schemars-v0_8",
  "serde",
]
serde = [
  "defuse-near-promise/serde",
  "defuse-time/serde",
  "dep:cfg_eval",
  "dep:serde",
  "dep:serde_with",
  "near-account-id/serde",
]

near-contract = ["defuse-near-promise/near-contract", "std"]

[dev-dependencies]
defuse-wallet-core = { path = ".", features = ["abi", "arbitrary", "borsh", "digest", "schemars-v0_8", "serde"] }
