[package]
name = "defuse-wallet-relayer"
edition.workspace = true
version = "0.1.0"
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
defuse-wallet-client.workspace = true
defuse-wallet-core = { workspace = true, features = ["serde"] }

futures.workspace = true
near-kit.workspace = true
serde.workspace = true
thiserror.workspace = true
tokio.workspace = true

tracing = { workspace = true, optional = true }

[features]
tracing = [
  "defuse-wallet-core/borsh",
  "defuse-wallet-core/digest",
  "dep:tracing",
]

[dev-dependencies]
defuse-wallet-relayer = { path = ".", features = ["tracing"] }

defuse-digest = { workspace = true, features = ["sha2"] }
defuse-wallet-sdk.workspace = true

ed25519-dalek = { workspace = true, features = ["rand_core"] }
hex.workspace = true
near-kit = { workspace = true, features = ["sandbox"] }
rand.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
