[package]
name = "defuse-wallet-sdk"
edition.workspace = true
version = "0.1.0"
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
defuse-time = { workspace = true, features = ["jiff"] }
defuse-wallet = { workspace = true, features = ["concurrent"] }
impl-tools.workspace = true
near-sdk = { workspace = true, features = ["non-contract-usage"] }
rand.workspace = true

borsh = { workspace = true, optional = true }
ed25519-dalek = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }

[features]
default = ["ed25519"]

ed25519 = [
  "defuse-wallet/ed25519",
  "dep:borsh",
  "dep:ed25519-dalek",
  "dep:sha2",
]
