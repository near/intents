[package]
name = "defuse-wallet-sdk"
edition.workspace = true
version = "0.1.0"
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
defuse-wallet-core = { workspace = true, features = ["borsh", "digest"] }

borsh.workspace = true
impl-tools.workspace = true
near-global-contracts = { workspace = true, features = ["borsh"] }
rand.workspace = true

defuse-crypto = { workspace = true, optional = true }
ed25519-dalek = { workspace = true, optional = true }

[features]
default = ["ed25519"]

ed25519 = ["defuse-crypto/ed25519", "dep:defuse-crypto", "dep:ed25519-dalek"]
json = ["defuse-wallet-core/json"]
