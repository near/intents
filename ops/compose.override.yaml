# Local-development overrides, auto-merged by `docker compose` (not uploaded to Phala).
# Builds the worker image from source so `docker compose up` works without a published image.
# Paths are relative to this file's dir (ops/), so the build context is the repo root (..).
services:
  worker:
    build:
      context: ..
      dockerfile: crates/outlayer/worker/Dockerfile
