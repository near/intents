services:
  worker:
    # Pinned by digest so the image is bound into the TEE attestation (local dev overrides via compose.override.yaml).
    image: ghcr.io/near/intents/outlayer-worker@sha256:a1b4933e97aef17789603fd7cde66e3923764e620769a072451d271f25e9e879
    environment:
      DSTACK_DOCKER_USERNAME: ${DSTACK_DOCKER_USERNAME}
      DSTACK_DOCKER_PASSWORD: ${DSTACK_DOCKER_PASSWORD}
      DSTACK_DOCKER_REGISTRY: ${DSTACK_DOCKER_REGISTRY}
      OUTLAYER__SEED: ${OUTLAYER__SEED}
      OUTLAYER__LOG: "${OUTLAYER__LOG:-info}"
      OUTLAYER__GRPC_SERVER__ADDR: "0.0.0.0:50051"
      OUTLAYER__GRPC_SERVER__CONCURRENCY_LIMIT_PER_CONNECTION: ${OUTLAYER__GRPC_SERVER__CONCURRENCY_LIMIT_PER_CONNECTION}
      OUTLAYER__GRPC__MAX_PARALLEL_WASM_EXECUTIONS: ${OUTLAYER__GRPC__MAX_PARALLEL_WASM_EXECUTIONS}
      OUTLAYER__GRPC__CONNECTIONS_LIMIT: ${OUTLAYER__GRPC__CONNECTIONS_LIMIT}
      OUTLAYER__GRPC__REQUEST_HANDLING_TIMEOUT_SECONDS: ${OUTLAYER__GRPC__REQUEST_HANDLING_TIMEOUT_SECONDS}
      OUTLAYER__SERVICE__CACHE__MAX_CAPACITY_BYTES: ${OUTLAYER__SERVICE__CACHE__MAX_CAPACITY_BYTES}
      OUTLAYER__SERVICE__CACHE__TIME_TO_IDLE_SECONDS: ${OUTLAYER__SERVICE__CACHE__TIME_TO_IDLE_SECONDS}
      OUTLAYER__SERVICE__DEFAULT_FUEL: ${OUTLAYER__SERVICE__DEFAULT_FUEL}
      OUTLAYER__SERVICE__EXECUTOR__IO_LIMITS__STDERR_BYTES: ${OUTLAYER__SERVICE__EXECUTOR__IO_LIMITS__STDERR_BYTES}
      OUTLAYER__SERVICE__EXECUTOR__IO_LIMITS__STDIN_BYTES: ${OUTLAYER__SERVICE__EXECUTOR__IO_LIMITS__STDIN_BYTES}
      OUTLAYER__SERVICE__EXECUTOR__IO_LIMITS__STDOUT_BYTES: ${OUTLAYER__SERVICE__EXECUTOR__IO_LIMITS__STDOUT_BYTES}
      OUTLAYER__SERVICE__EXECUTOR__MEMORY_LIMIT_BYTES: ${OUTLAYER__SERVICE__EXECUTOR__MEMORY_LIMIT_BYTES}
      OUTLAYER__SERVICE__RESOLVER__HTTP_MAX_BODY_BYTES: ${OUTLAYER__SERVICE__RESOLVER__HTTP_MAX_BODY_BYTES}
      OUTLAYER__SERVICE__RESOLVER__NEAR_CACHE_TTL_MILLISECONDS: ${OUTLAYER__SERVICE__RESOLVER__NEAR_CACHE_TTL_MILLISECONDS}
      OUTLAYER__SERVICE__RESOLVER__NEAR_CHAIN_ID: ${OUTLAYER__SERVICE__RESOLVER__NEAR_CHAIN_ID}
      OUTLAYER__SERVICE__RESOLVER__NEAR_RPC_URL: ${OUTLAYER__SERVICE__RESOLVER__NEAR_RPC_URL}
    ports:
      - "50051:50051"
