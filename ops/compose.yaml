services:
  worker:
    # Pinned by digest so the image is bound into the TEE attestation (local dev overrides via compose.override.yaml).
    image: ghcr.io/near/intents/outlayer-worker@sha256:<DIGEST>
    environment:
      DSTACK_DOCKER_USERNAME: ${DSTACK_DOCKER_USERNAME}
      DSTACK_DOCKER_PASSWORD: ${DSTACK_DOCKER_PASSWORD}
      DSTACK_DOCKER_REGISTRY: ${DSTACK_DOCKER_REGISTRY}
      OUTLAYER__SEED: ${OUTLAYER__SEED}
      OUTLAYER__LOG: "${OUTLAYER__LOG:-outlayer=info,defuse_outlayer_service=debug,defuse_outlayer_executor=debug}"
      OUTLAYER__GRPC_SERVER__ADDR: "${OUTLAYER__GRPC_SERVER__ADDR:-0.0.0.0:50051}"
      OUTLAYER__GRPC_SERVER__CONCURRENCY_LIMIT_PER_CONNECTION: "${OUTLAYER__GRPC_SERVER__CONCURRENCY_LIMIT_PER_CONNECTION:-1}"
      OUTLAYER__GRPC__MAX_PARALLEL_WASM_EXECUTIONS: "${OUTLAYER__GRPC__MAX_PARALLEL_WASM_EXECUTIONS:-8}"
      OUTLAYER__GRPC__CONNECTIONS_LIMIT: "${OUTLAYER__GRPC__CONNECTIONS_LIMIT:-10}"
      OUTLAYER__GRPC__REQUEST_HANDLING_TIMEOUT_SECONDS: "${OUTLAYER__GRPC__REQUEST_HANDLING_TIMEOUT_SECONDS:-30}"
      OUTLAYER__SERVICE__CACHE__MAX_CAPACITY_BYTES: "${OUTLAYER__SERVICE__CACHE__MAX_CAPACITY_BYTES:-104857600}"
      OUTLAYER__SERVICE__CACHE__TIME_TO_IDLE_SECONDS: "${OUTLAYER__SERVICE__CACHE__TIME_TO_IDLE_SECONDS:-3600}"
      OUTLAYER__SERVICE__DEFAULT_FUEL: "${OUTLAYER__SERVICE__DEFAULT_FUEL:-1000000000}"
      OUTLAYER__SERVICE__EXECUTOR__IO_LIMITS__STDERR: "${OUTLAYER__SERVICE__EXECUTOR__IO_LIMITS__STDERR:-16384}"
      OUTLAYER__SERVICE__EXECUTOR__IO_LIMITS__STDIN: "${OUTLAYER__SERVICE__EXECUTOR__IO_LIMITS__STDIN:-4194304}"
      OUTLAYER__SERVICE__EXECUTOR__IO_LIMITS__STDOUT: "${OUTLAYER__SERVICE__EXECUTOR__IO_LIMITS__STDOUT:-4194304}"
      OUTLAYER__SERVICE__EXECUTOR__MEMORY_LIMIT_BYTES: "${OUTLAYER__SERVICE__EXECUTOR__MEMORY_LIMIT_BYTES:-104857600}"
      OUTLAYER__SERVICE__RESOLVER__HTTP_MAX_BODY_BYTES: "${OUTLAYER__SERVICE__RESOLVER__HTTP_MAX_BODY_BYTES:-10485760}"
      OUTLAYER__SERVICE__RESOLVER__NEAR_CHAIN_ID: "${OUTLAYER__SERVICE__RESOLVER__NEAR_CHAIN_ID:-mainnet}"
      OUTLAYER__SERVICE__RESOLVER__NEAR_RPC_URL: "${OUTLAYER__SERVICE__RESOLVER__NEAR_RPC_URL:-https://rpc.mainnet.near.org}"
    ports:
      - "50051:50051"
