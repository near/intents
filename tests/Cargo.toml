[package]
name = "defuse-tests"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[features]
default = [
    "defuse",
    "poa",
    "escrow-proxy",
    "escrow-swap",
    "condvar",
    "long",
    "deployer",
    "wallet",
]

poa = ["dep:defuse-poa-factory", "defuse-sandbox/poa", "defuse-test-utils/poa"]
defuse = [
    "dep:defuse",
    "defuse-sandbox/defuse",
    "defuse-sandbox/poa",
    "defuse-sandbox/imt",
    "defuse-test-utils/defuse",
    "defuse-test-utils/poa",
]
escrow-swap = [
    "dep:defuse-escrow-swap",
    "defuse-sandbox/escrow",
    "defuse-sandbox/defuse",
    "defuse-sandbox/poa",
    "defuse-test-utils/escrow",
    "defuse-test-utils/defuse",
    "defuse-test-utils/poa",
]
wallet = [
    "dep:defuse-wallet",
    "defuse-sandbox/wallet",
    "defuse-test-utils/wallet",
    "deployer",
]

deployer = ["dep:defuse-global-deployer", "defuse-sandbox/deployer"]

long = []
escrow-proxy = [
    "dep:defuse-escrow-proxy",
    "defuse-sandbox/escrow-proxy",
    "defuse-test-utils/escrow-proxy",
]
condvar = [
    "dep:defuse-oneshot-condvar",
    "defuse-sandbox/condvar",
    "defuse-test-utils/oneshot",
]
mt-receiver = []

[dependencies]
defuse-sandbox = { workspace = true }
defuse = { workspace = true, features = [
    "contract",
    "arbitrary",
    "far",
], optional = true }
defuse-escrow-swap = { workspace = true, features = [
    "auth_call",
], optional = true }
defuse-poa-factory = { workspace = true, features = [
    "contract",
], optional = true }
defuse-wallet = { workspace = true, features = [
    "arbitrary",
    "concurrent",
    "ed25519",
], optional = true }
multi-token-receiver-stub = { path = "contracts/multi-token-receiver-stub" }

defuse-core.workspace = true
defuse-near-utils = { workspace = true }
defuse-nep245.workspace = true
defuse-randomness.workspace = true
defuse-serde-utils = { workspace = true }
defuse-test-utils.workspace = true
defuse-fees.workspace = true
defuse-global-deployer = { workspace = true, optional = true }

near-sdk = { workspace = true, features = [
    "unit-testing",
    "deterministic-account-ids",
] }
near-crypto.workspace = true
near-contract-standards.workspace = true

futures = "0.3"
anyhow.workspace = true
arbitrary.workspace = true
bnum = { workspace = true, features = ["rand"] }
chrono.workspace = true
derive_more.workspace = true
hex-literal.workspace = true
hex.workspace = true
impl-tools.workspace = true
itertools.workspace = true

rstest.workspace = true
strum.workspace = true
tokio = { workspace = true, features = ["macros"] }
tlb-ton = { workspace = true, features = ["arbitrary"] }

defuse-escrow-proxy = { workspace = true, features = [
    "escrow-swap",
], optional = true }
defuse-oneshot-condvar = { workspace = true, optional = true }
