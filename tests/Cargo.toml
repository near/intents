[package]
name = "defuse-tests"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[features]
default = [
  "defuse",
  "deployer",
  "escrow-swap",
  "long",
  "outlayer",
  "poa",
  "wallet",
]

poa = ["defuse-sandbox/poa", "defuse-test-utils/poa"]
defuse = [
  "defuse-sandbox/defuse",
  "defuse-sandbox/imt",
  "defuse-sandbox/poa",
  "defuse-test-utils/defuse",
  "defuse-test-utils/poa",
  # "dep:defuse",
]
escrow-swap = [
  "defuse-sandbox/defuse",
  "defuse-sandbox/escrow",
  "defuse-sandbox/poa",
  "defuse-test-utils/defuse",
  "defuse-test-utils/escrow",
  "defuse-test-utils/poa",
  # "dep:defuse-escrow-swap",
]
wallet = ["defuse-sandbox/wallet", "defuse-test-utils/wallet", "deployer"]

deployer = ["defuse-sandbox/deployer"]
# "dep:defuse-global-deployer"]

outlayer = [
  "defuse-sandbox/outlayer",
  "defuse-test-utils/outlayer",
  # "dep:defuse-outlayer-app",
]

long = []

[dependencies]
anyhow.workspace = true
arbitrary.workspace = true
borsh.workspace = true
chrono.workspace = true
defuse-core = { workspace = true, features = ["near-kit"] }
defuse-fees.workspace = true
defuse-near-utils = { workspace = true }
defuse-randomness.workspace = true
defuse-sandbox = { workspace = true }
defuse-serde-utils = { workspace = true, features = ["hex"] }
defuse-test-utils = { workspace = true, features = ["near-contract"] }
derive_more.workspace = true
futures = "0.3"
impl-tools.workspace = true
itertools.workspace = true
multi-token-receiver-stub = { path = "contracts/multi-token-receiver-stub" }
near-contract-standards.workspace = true
near-crypto.workspace = true
# TODO: remove it when near kit will contain necessary types
near-sdk.workspace = true
rstest.workspace = true
serde_json.workspace = true
serde_with.workspace = true
strum.workspace = true
tokio = { workspace = true, features = ["macros"] }
