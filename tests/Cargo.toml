[package]
name = "defuse-tests"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true

[lints]
workspace = true

[features]
default = ["defuse", "deployer", "escrow-swap", "long", "poa", "wallet"]

poa = ["defuse-sandbox/poa", "defuse-test-utils/poa", "dep:defuse-poa-factory"]
defuse = [
  "defuse-sandbox/defuse",
  "defuse-sandbox/imt",
  "defuse-sandbox/poa",
  "defuse-test-utils/defuse",
  "defuse-test-utils/poa",
  "dep:defuse",
]
escrow-swap = [
  "defuse-sandbox/defuse",
  "defuse-sandbox/escrow",
  "defuse-sandbox/poa",
  "defuse-test-utils/defuse",
  "defuse-test-utils/escrow",
  "defuse-test-utils/poa",
  "dep:defuse-escrow-swap",
]
wallet = [
  "defuse-sandbox/wallet",
  "defuse-test-utils/wallet",
  "dep:defuse-wallet",
  "deployer",
]

deployer = ["defuse-sandbox/deployer", "dep:defuse-global-deployer"]

long = []

[dependencies]
defuse = { workspace = true, features = ["contract", "arbitrary", "far"], optional = true }
defuse-escrow-swap = { workspace = true, features = ["auth_call"], optional = true }
defuse-poa-factory = { workspace = true, features = ["contract"], optional = true }
defuse-sandbox = { workspace = true }
defuse-wallet = { workspace = true, features = ["arbitrary", "concurrent", "ed25519"], optional = true }
multi-token-receiver-stub = { path = "contracts/multi-token-receiver-stub" }

defuse-fees.workspace = true
defuse-global-deployer = { workspace = true, optional = true }
defuse-near-utils = { workspace = true }
defuse-nep245.workspace = true
defuse-randomness.workspace = true
defuse-serde-utils = { workspace = true }
defuse-test-utils.workspace = true

near-contract-standards.workspace = true
near-crypto.workspace = true
near-sdk.workspace = true

anyhow.workspace = true
arbitrary.workspace = true
bnum = { workspace = true, features = ["rand"] }
chrono.workspace = true
derive_more.workspace = true
futures = "0.3"
hex.workspace = true
hex-literal.workspace = true
impl-tools.workspace = true
itertools.workspace = true

rstest.workspace = true
serde_json.workspace = true
strum.workspace = true
tlb-ton = { workspace = true, features = ["arbitrary"] }
tokio = { workspace = true, features = ["macros"] }
